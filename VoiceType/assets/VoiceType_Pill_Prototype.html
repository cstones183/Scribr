<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoiceType — Pill Interface</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
    }

    :root {
      --navy: #060911;
      --glass: rgba(8, 12, 24, 0.78);
      --glass2: rgba(10, 16, 32, 0.90);
      --border: rgba(255, 255, 255, 0.07);
      --border-hi: rgba(255, 255, 255, 0.13);
      --blue: #5bc4ff;
      --blue-soft: rgba(91, 196, 255, 0.22);
      --blue-glow: rgba(91, 196, 255, 0.18);
      --blue-dim: rgba(91, 196, 255, 0.08);
      --green: #3de8a0;
      --red: #ff5a6e;
      --amber: #ffc84a;
      --t1: rgba(255, 255, 255, 0.93);
      --t2: rgba(255, 255, 255, 0.55);
      --t3: rgba(255, 255, 255, 0.28);
      --t4: rgba(255, 255, 255, 0.12);
      --font: 'Inter', -apple-system, 'Helvetica Neue', sans-serif;
      --r-pill: 999px;
      --r-card: 20px;
      --r-sm: 10px;
    }

    body {
      font-family: var(--font);
      background: var(--navy);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
      overflow-x: hidden;
    }

    /* ambient glow */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 55% 35% at 15% 15%, rgba(20, 50, 110, 0.40) 0%, transparent 65%),
        radial-gradient(ellipse 45% 45% at 85% 85%, rgba(8, 35, 80, 0.35) 0%, transparent 65%),
        radial-gradient(ellipse 60% 25% at 50% 105%, rgba(91, 196, 255, 0.08) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    body>* {
      position: relative;
      z-index: 1;
    }

    /* ────────────────────────────────
   PAGE LABEL
──────────────────────────────── */
    .page-tag {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--t3);
      margin-bottom: 48px;
      text-align: center;
    }

    /* ────────────────────────────────
   DEMO STAGE  — simulated screen
──────────────────────────────── */
    .stage {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ────────────────────────────────
   CONTROLS — demo buttons
──────────────────────────────── */
    .demo-controls {
      display: flex;
      gap: 8px;
      margin-bottom: 40px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .ctrl-btn {
      padding: 6px 14px;
      border-radius: 99px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--t2);
      font-size: 11px;
      font-family: var(--font);
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.3px;
    }

    .ctrl-btn:hover {
      background: rgba(255, 255, 255, 0.10);
      color: var(--t1);
    }

    .ctrl-btn.active {
      background: var(--blue-dim);
      color: var(--blue);
      border-color: rgba(91, 196, 255, 0.22);
    }

    /* ────────────────────────────────
   THE WHOLE PILL SYSTEM
   pill + notepad are siblings
   inside .pill-system
──────────────────────────────── */
    .pill-system {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      width: 100%;
    }

    /* ────────────────────────────────
   PILL
──────────────────────────────── */
    .pill {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 18px;
      height: 40px;
      border-radius: var(--r-pill);
      background: var(--glass);
      border: 1px solid var(--border-hi);
      backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.035) inset,
        0 8px 32px rgba(0, 0, 0, 0.55),
        0 0 24px var(--blue-glow);
      position: relative;
      z-index: 10;
      white-space: nowrap;
      transition: box-shadow 0.3s, width 0.4s cubic-bezier(0.34, 1.2, 0.64, 1);

      /* entrance */
      animation: pillIn 0.45s cubic-bezier(0.34, 1.3, 0.64, 1) both;
    }

    @keyframes pillIn {
      from {
        opacity: 0;
        transform: translateY(16px) scale(0.88);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* top sheen */
    .pill::before {
      content: '';
      position: absolute;
      top: 0;
      left: 16px;
      right: 16px;
      height: 1px;
      background: linear-gradient(90deg,
          transparent, rgba(255, 255, 255, 0.22) 40%, rgba(255, 255, 255, 0.28) 50%,
          rgba(255, 255, 255, 0.22) 60%, transparent);
      border-radius: 99px;
    }

    /* ── Pulse dot ── */
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--red);
      flex-shrink: 0;
      box-shadow: 0 0 7px rgba(255, 90, 110, 0.8);
      animation: dotPulse 1.1s ease-in-out infinite;
    }

    @keyframes dotPulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.3;
        transform: scale(0.75);
      }
    }

    .dot.blue {
      background: var(--blue);
      box-shadow: 0 0 7px rgba(91, 196, 255, 0.8);
      animation: dotPulse 1.4s ease-in-out infinite;
    }

    .dot.green {
      background: var(--green);
      box-shadow: 0 0 7px rgba(61, 232, 160, 0.8);
      animation: none;
      opacity: 1;
    }

    /* ── Waveform bars (inline in pill) ── */
    .pill-wave {
      display: flex;
      align-items: center;
      gap: 2.5px;
      height: 20px;
    }

    .pill-bar {
      width: 2.5px;
      border-radius: 99px;
      background: var(--blue);
      box-shadow: 0 0 5px rgba(91, 196, 255, 0.7);
      min-height: 3px;
    }

    .pill-bar:nth-child(1) {
      animation: pb1 0.85s ease-in-out infinite;
    }

    .pill-bar:nth-child(2) {
      animation: pb2 0.70s ease-in-out infinite 0.07s;
    }

    .pill-bar:nth-child(3) {
      animation: pb3 0.80s ease-in-out infinite 0.14s;
    }

    .pill-bar:nth-child(4) {
      animation: pb2 0.65s ease-in-out infinite 0.0s;
    }

    .pill-bar:nth-child(5) {
      animation: pb3 0.80s ease-in-out infinite 0.21s;
    }

    .pill-bar:nth-child(6) {
      animation: pb2 0.70s ease-in-out infinite 0.10s;
    }

    .pill-bar:nth-child(7) {
      animation: pb1 0.85s ease-in-out infinite 0.05s;
    }

    @keyframes pb1 {

      0%,
      100% {
        height: 3px
      }

      50% {
        height: 9px
      }
    }

    @keyframes pb2 {

      0%,
      100% {
        height: 3px
      }

      50% {
        height: 14px
      }
    }

    @keyframes pb3 {

      0%,
      100% {
        height: 3px
      }

      50% {
        height: 19px
      }
    }

    /* ── Pill label ── */
    .pill-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--t2);
      letter-spacing: 0.15px;
    }

    /* ── Pill spinner ── */
    .pill-spinner {
      width: 14px;
      height: 14px;
      border: 1.5px solid rgba(91, 196, 255, 0.25);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
      flex-shrink: 0;
      filter: drop-shadow(0 0 3px var(--blue-glow));
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── Live transcript text inside pill ── */
    .pill-live-text {
      font-size: 12px;
      font-weight: 400;
      color: var(--t1);
      max-width: 260px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      letter-spacing: 0.1px;
    }

    /* Cursor blink */
    .pill-live-text::after {
      content: '|';
      color: var(--blue);
      animation: blink 0.9s step-end infinite;
      margin-left: 1px;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0
      }
    }

    /* ── Pill timer ── */
    .pill-timer {
      font-size: 11px;
      font-weight: 400;
      color: var(--t3);
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.2px;
    }

    /* ── Separator in pill ── */
    .pill-sep {
      width: 1px;
      height: 14px;
      background: var(--border-hi);
      flex-shrink: 0;
    }

    /* ────────────────────────────────
   CONNECTOR — pill → notepad
──────────────────────────────── */
    .connector-wrap {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 340px;
      height: 0;
      overflow: visible;
      transition: height 0.45s cubic-bezier(0.34, 1.1, 0.64, 1);
      z-index: 5;
    }

    .connector-wrap.open {
      height: 56px;
    }

    .connector {
      width: 1px;
      height: 0;
      background: linear-gradient(to bottom,
          rgba(91, 196, 255, 0.0) 0%,
          rgba(91, 196, 255, 0.50) 40%,
          rgba(91, 196, 255, 0.50) 60%,
          rgba(91, 196, 255, 0.0) 100%);
      transition: height 0.45s cubic-bezier(0.34, 1.1, 0.64, 1);
      position: relative;
      z-index: 5;
      margin: 0 auto;
    }

    .connector.open {
      height: 56px;
    }

    /* Canvas particle stream sits over the connector */
    #stream-canvas {
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
      z-index: 20;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    #stream-canvas.active {
      opacity: 1;
    }

    /* ────────────────────────────────
   NOTEPAD
──────────────────────────────── */
    .notepad {
      width: 340px;
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transform: translateY(-8px) scale(0.97);
      transition:
        max-height 0.5s cubic-bezier(0.34, 1.1, 0.64, 1),
        opacity 0.35s cubic-bezier(0.34, 1.1, 0.64, 1),
        transform 0.4s cubic-bezier(0.34, 1.2, 0.64, 1);
      position: relative;
      z-index: 9;
    }

    .notepad.open {
      max-height: 420px;
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .notepad-inner {
      background: var(--glass2);
      border: 1px solid var(--border-hi);
      border-radius: var(--r-card);
      backdrop-filter: blur(36px) saturate(160%);
      -webkit-backdrop-filter: blur(36px) saturate(160%);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.04) inset,
        0 20px 60px rgba(0, 0, 0, 0.65),
        0 0 40px rgba(91, 196, 255, 0.05) inset;
      overflow: hidden;
      position: relative;
    }

    .notepad-inner::before {
      content: '';
      position: absolute;
      top: 0;
      left: 14px;
      right: 14px;
      height: 1px;
      background: linear-gradient(90deg,
          transparent, rgba(255, 255, 255, 0.10) 30%,
          rgba(255, 255, 255, 0.16) 50%,
          rgba(255, 255, 255, 0.10) 70%, transparent);
    }

    /* notepad header */
    .notepad-header {
      padding: 12px 14px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .notepad-head-left {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .notepad-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--blue);
      box-shadow: 0 0 6px rgba(91, 196, 255, 0.8);
      animation: dotPulse 1.6s ease-in-out infinite;
    }

    .notepad-title {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2.2px;
      text-transform: uppercase;
      color: var(--t3);
    }

    .notepad-close {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.07);
      color: var(--t3);
      font-size: 9px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      font-family: var(--font);
    }

    .notepad-close:hover {
      background: rgba(255, 255, 255, 0.12);
      color: var(--t1);
    }

    /* live text area */
    .notepad-text-area {
      padding: 14px 16px;
      min-height: 80px;
      font-size: 14px;
      font-weight: 400;
      line-height: 1.65;
      color: var(--t1);
      font-family: var(--font);
      letter-spacing: 0.1px;
      position: relative;
    }

    /* words animate in */
    .word {
      display: inline;
    }

    .word.new {
      animation: wordFadeIn 0.25s ease-out both;
    }

    @keyframes wordFadeIn {
      from {
        opacity: 0;
        transform: translateY(3px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .word.amber {
      border-bottom: 1.5px solid rgba(255, 200, 74, 0.75);
      color: rgba(255, 220, 120, 0.95);
    }

    /* live cursor in notepad */
    .notepad-cursor {
      display: inline-block;
      width: 2px;
      height: 15px;
      background: var(--blue);
      border-radius: 1px;
      vertical-align: middle;
      margin-left: 2px;
      animation: blink 0.9s step-end infinite;
      box-shadow: 0 0 6px rgba(91, 196, 255, 0.8);
    }

    /* notepad footer */
    .notepad-footer {
      padding: 10px 14px 14px;
      display: flex;
      gap: 7px;
      align-items: center;
      border-top: 1px solid var(--border);
    }

    .np-btn {
      padding: 5px 12px;
      border-radius: 99px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.07);
      color: var(--t2);
      font-size: 11px;
      font-family: var(--font);
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .np-btn:hover {
      background: rgba(255, 255, 255, 0.12);
      color: var(--t1);
    }

    .np-btn.primary {
      background: var(--blue);
      border-color: transparent;
      color: rgba(0, 0, 0, 0.85);
      font-weight: 600;
      box-shadow: 0 0 14px var(--blue-glow);
      margin-left: auto;
    }

    .np-btn.primary:hover {
      background: #7dd4ff;
      box-shadow: 0 0 22px rgba(91, 196, 255, 0.45);
    }

    /* char count */
    .char-count {
      font-size: 10px;
      color: var(--t3);
      margin-left: auto;
    }

    /* ────────────────────────────────
   IDLE STATE
──────────────────────────────── */
    .pill.idle {
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.035) inset,
        0 4px 16px rgba(0, 0, 0, 0.40);
      border-color: var(--border);
    }

    /* ────────────────────────────────
   STATE VISIBILITY
──────────────────────────────── */
    .pill-state {
      display: none;
      align-items: center;
      gap: 10px;
    }

    .pill-state.vis {
      display: flex;
    }

    /* ────────────────────────────────
   DEMO SIMULATION
──────────────────────────────── */
  </style>
</head>

<body>

  <div class="page-tag">VoiceType · Pill Interface Prototype</div>

  <div class="stage">

    <!-- Demo controls -->
    <div class="demo-controls">
      <button class="ctrl-btn active" onclick="setMode('idle')">💤 Idle</button>
      <button class="ctrl-btn" onclick="setMode('recording')">🎙 Recording</button>
      <button class="ctrl-btn" onclick="setMode('live')">⚡ Live Transcribing</button>
      <button class="ctrl-btn" onclick="setMode('notepad')">📋 Notepad</button>
      <button class="ctrl-btn" onclick="setMode('success')">✅ Typed in Field</button>
    </div>

    <!-- The full pill system -->
    <div class="pill-system">

      <!-- ══ PILL ══ -->
      <div class="pill idle" id="pill">

        <!-- Idle -->
        <div class="pill-state vis" id="s-idle">
          <div class="dot" style="background:var(--t4);box-shadow:none;animation:none;opacity:0.5"></div>
          <span class="pill-label">Hold Right ⌥ to record</span>
        </div>

        <!-- Recording -->
        <div class="pill-state" id="s-recording">
          <div class="dot"></div>
          <div class="pill-wave">
            <div class="pill-bar"></div>
            <div class="pill-bar"></div>
            <div class="pill-bar"></div>
            <div class="pill-bar"></div>
            <div class="pill-bar"></div>
            <div class="pill-bar"></div>
            <div class="pill-bar"></div>
          </div>
          <div class="pill-sep"></div>
          <span class="pill-timer" id="timer">0:00</span>
        </div>

        <!-- Live transcribing (recording + text appearing) -->
        <div class="pill-state" id="s-live">
          <div class="dot"></div>
          <div class="pill-wave">
            <div class="pill-bar"></div>
            <div class="pill-bar"></div>
            <div class="pill-bar"></div>
            <div class="pill-bar"></div>
            <div class="pill-bar"></div>
            <div class="pill-bar"></div>
            <div class="pill-bar"></div>
          </div>
          <div class="pill-sep"></div>
          <span class="pill-live-text" id="pill-live-preview"></span>
        </div>

        <!-- Notepad / done -->
        <div class="pill-state" id="s-notepad">
          <div class="dot blue"></div>
          <span class="pill-label" style="color:var(--blue)">Tap to edit · Right ⌥ to record again</span>
        </div>

        <!-- Success -->
        <div class="pill-state" id="s-success">
          <div class="dot green"></div>
          <span class="pill-label" style="color:var(--green)">Typed into field</span>
        </div>

      </div>

      <!-- ══ CONNECTOR + PARTICLE STREAM ══ -->
      <div class="connector-wrap" id="connector-wrap">
        <canvas id="stream-canvas" width="160" height="96"></canvas>
        <div class="connector" id="connector"></div>
      </div>

      <!-- ══ NOTEPAD ══ -->
      <div class="notepad" id="notepad">
        <div class="notepad-inner">

          <div class="notepad-header">
            <div class="notepad-head-left">
              <div class="notepad-dot" id="notepad-dot"></div>
              <span class="notepad-title">VoiceType</span>
            </div>
            <button class="notepad-close" onclick="setMode('idle')">✕</button>
          </div>

          <div class="notepad-text-area" id="notepad-body">
            <!-- filled by JS -->
          </div>

          <div class="notepad-footer">
            <button class="np-btn">✏️ Edit</button>
            <button class="np-btn">🔄 Retry</button>
            <span class="char-count" id="char-count">0 chars</span>
            <button class="np-btn primary">📋 Copy &amp; Close</button>
          </div>

        </div>
      </div>

    </div><!-- /pill-system -->

  </div><!-- /stage -->

  <script>
    /* ══════════════════════════════════════
       STATE MACHINE
    ══════════════════════════════════════ */

    const states = ['idle', 'recording', 'live', 'notepad', 'success'];
    let currentMode = 'idle';
    let timerInterval = null;
    let timerSeconds = 0;
    let liveInterval = null;
    let liveWordIndex = 0;

    // Sample transcript to stream word by word
    const sampleWords = [
      "Hey,", "just", "a", "quick", "note", "—", "can", "we", "push", "the",
      "meeting", "to", "3pm?", "I'm", "running", "behind", "on", "the",
      { text: "deliverables", amber: true },
      "from", "this", "morning", "and", "want", "to", "make", "sure", "I've",
      "got", "everything", "ready", "before", "we", "jump", "on", "the", "call."
    ];

    function setMode(mode) {
      currentMode = mode;

      // update buttons
      document.querySelectorAll('.ctrl-btn').forEach(b => b.classList.remove('active'));
      const idx = states.indexOf(mode);
      if (idx >= 0) document.querySelectorAll('.ctrl-btn')[idx].classList.add('active');

      // hide all states
      document.querySelectorAll('.pill-state').forEach(el => el.classList.remove('vis'));

      // clear timers
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
      if (liveInterval) { clearInterval(liveInterval); liveInterval = null; }

      const pill = document.getElementById('pill');
      const connWrap = document.getElementById('connector-wrap');
      const connector = document.getElementById('connector');
      const notepad = document.getElementById('notepad');

      // defaults — close everything
      pill.classList.remove('idle');
      connWrap.classList.remove('open');
      connector.classList.remove('open');
      notepad.classList.remove('open');
      stopStream();

      if (mode === 'idle') {
        pill.classList.add('idle');
        show('s-idle');
      }

      else if (mode === 'recording') {
        show('s-recording');
        startTimer();
      }

      else if (mode === 'live') {
        show('s-live');
        startTimer();
        startLiveText();
        // open connector + notepad + start particle stream
        connWrap.classList.add('open');
        connector.classList.add('open');
        notepad.classList.add('open');
        clearNotepad();
        startNotepadStream();
        startStream();
        // notepad dot pulses while streaming
        document.getElementById('notepad-dot').style.animation = 'dotPulse 1.3s ease-in-out infinite';
        document.getElementById('notepad-dot').style.background = 'var(--blue)';
        document.getElementById('notepad-dot').style.boxShadow = '0 0 6px rgba(91,196,255,0.8)';
      }

      else if (mode === 'notepad') {
        show('s-notepad');
        connWrap.classList.add('open');
        connector.classList.add('open');
        notepad.classList.add('open');
        // stream stops — text has arrived
        stopStream();
        document.getElementById('notepad-dot').style.animation = 'none';
        document.getElementById('notepad-dot').style.background = 'var(--t3)';
        document.getElementById('notepad-dot').style.boxShadow = 'none';
        fillNotepadFull();
        document.getElementById('char-count').textContent = '147 chars';
      }

      else if (mode === 'success') {
        show('s-success');
        pill.classList.add('idle');
        // auto revert
        setTimeout(() => {
          if (currentMode === 'success') setMode('idle');
        }, 2200);
      }
    }

    function show(id) {
      document.getElementById(id).classList.add('vis');
    }

    /* ── Timer ── */
    function startTimer() {
      timerSeconds = 0;
      document.getElementById('timer').textContent = '0:00';
      timerInterval = setInterval(() => {
        timerSeconds++;
        const m = Math.floor(timerSeconds / 60);
        const s = timerSeconds % 60;
        document.getElementById('timer').textContent = `${m}:${s.toString().padStart(2, '0')}`;
      }, 1000);
    }

    /* ── Live pill text ── */
    function startLiveText() {
      const preview = document.getElementById('pill-live-preview');
      let words = [];
      let idx = 0;
      liveInterval = setInterval(() => {
        if (idx >= sampleWords.length) { clearInterval(liveInterval); return; }
        const w = sampleWords[idx];
        words.push(typeof w === 'string' ? w : w.text);
        preview.textContent = words.slice(-4).join(' ');
        idx++;
      }, 280);
    }

    /* ── Notepad streaming ── */
    function clearNotepad() {
      liveWordIndex = 0;
      document.getElementById('notepad-body').innerHTML = '<span class="notepad-cursor"></span>';
      document.getElementById('char-count').textContent = '0 chars';
    }

    function startNotepadStream() {
      const body = document.getElementById('notepad-body');
      let charCount = 0;
      let wordIdx = 0;

      const streamInterval = setInterval(() => {
        if (wordIdx >= sampleWords.length) {
          clearInterval(streamInterval);
          // remove cursor
          const cursor = body.querySelector('.notepad-cursor');
          if (cursor) cursor.remove();
          return;
        }

        const w = sampleWords[wordIdx];
        const text = typeof w === 'string' ? w : w.text;
        const isAmber = typeof w === 'object' && w.amber;

        const cursor = body.querySelector('.notepad-cursor');

        const span = document.createElement('span');
        span.className = 'word new' + (isAmber ? ' amber' : '');
        span.textContent = text + ' ';
        body.insertBefore(span, cursor);

        charCount += text.length + 1;
        document.getElementById('char-count').textContent = charCount + ' chars';
        wordIdx++;
      }, 260);
    }

    function fillNotepadFull() {
      const body = document.getElementById('notepad-body');
      body.innerHTML = '';
      const full = [
        { text: "Hey,", amber: false },
        { text: "just a quick note — can we push the meeting to 3pm?", amber: false },
        { text: "I'm running behind on the", amber: false },
        { text: "deliverables", amber: true },
        { text: "from this morning and want to make sure I've got everything ready before we jump on the call.", amber: false },
      ];
      full.forEach(item => {
        const span = document.createElement('span');
        span.className = 'word' + (item.amber ? ' amber' : '');
        span.textContent = item.text + ' ';
        body.appendChild(span);
      });
    }

    /* ══════════════════════════════════════
       PARTICLE STREAM — canvas animation
    ══════════════════════════════════════ */

    const streamCanvas = document.getElementById('stream-canvas');
    const ctx = streamCanvas.getContext('2d');
    let streamActive = false;
    let streamParticles = [];
    let streamRaf = null;

    // Characters / glyphs that stream down — mix of letters, punctuation
    const streamGlyphs = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz.,!?-—';

    class StreamParticle {
      constructor() { this.reset(true); }

      reset(initial = false) {
        // Start from pill bottom, travel to notepad top
        this.x = streamCanvas.width / 2 + (Math.random() - 0.5) * 28;
        this.y = initial ? Math.random() * streamCanvas.height : -4;
        this.vy = 1.4 + Math.random() * 1.8;       // speed
        this.alpha = 0;
        this.targetAlpha = 0.4 + Math.random() * 0.55;
        this.size = 8 + Math.random() * 5;
        this.glyph = streamGlyphs[Math.floor(Math.random() * streamGlyphs.length)];
        this.glyphTimer = 0;
        this.glyphInterval = 4 + Math.floor(Math.random() * 8); // frames before char changes
        this.trail = [];
        this.trailLength = 3 + Math.floor(Math.random() * 3);
        // Color: mostly blue-white, occasionally brighter
        const bright = Math.random() > 0.8;
        this.color = bright ? '#ffffff' : '#5bc4ff';
        this.glowColor = bright ? 'rgba(180,230,255,0.8)' : 'rgba(91,196,255,0.7)';
        this.life = 0;
        this.maxLife = (streamCanvas.height / this.vy) * (0.8 + Math.random() * 0.4);
      }

      update() {
        // Save trail
        this.trail.unshift({ x: this.x, y: this.y, alpha: this.alpha });
        if (this.trail.length > this.trailLength) this.trail.pop();

        this.y += this.vy;
        this.x += (Math.random() - 0.5) * 0.4; // slight horizontal wobble
        this.life++;

        // Fade in at top, fade out at bottom
        const progress = this.life / this.maxLife;
        if (progress < 0.15) {
          this.alpha = (progress / 0.15) * this.targetAlpha;
        } else if (progress > 0.75) {
          this.alpha = ((1 - progress) / 0.25) * this.targetAlpha;
        } else {
          this.alpha = this.targetAlpha;
        }

        // Occasionally change glyph (flickering letter effect)
        this.glyphTimer++;
        if (this.glyphTimer >= this.glyphInterval) {
          this.glyph = streamGlyphs[Math.floor(Math.random() * streamGlyphs.length)];
          this.glyphTimer = 0;
        }

        // Reset if off screen or life exhausted
        if (this.y > streamCanvas.height + 10 || this.life >= this.maxLife) {
          this.reset();
        }
      }

      draw(ctx) {
        // Draw trail (fading copies above)
        this.trail.forEach((t, i) => {
          const trailAlpha = t.alpha * (1 - (i + 1) / (this.trail.length + 1)) * 0.4;
          ctx.globalAlpha = trailAlpha;
          ctx.fillStyle = this.color;
          ctx.font = `${this.size * 0.8}px 'Inter', monospace`;
          ctx.fillText(this.glyph, t.x - this.size * 0.3, t.y);
        });

        // Glow
        ctx.shadowBlur = 10;
        ctx.shadowColor = this.glowColor;
        ctx.globalAlpha = this.alpha;
        ctx.fillStyle = this.color;
        ctx.font = `500 ${this.size}px 'Inter', monospace`;
        ctx.fillText(this.glyph, this.x - this.size * 0.3, this.y);
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;
      }
    }

    // Occasional "burst" packets — solid bright dots shooting down
    class BurstPacket {
      constructor() { this.reset(); }
      reset() {
        this.x = streamCanvas.width / 2 + (Math.random() - 0.5) * 10;
        this.y = 0;
        this.vy = 3.5 + Math.random() * 2.5;
        this.radius = 2 + Math.random() * 1.5;
        this.alpha = 0.9;
        this.done = false;
      }
      update() {
        this.y += this.vy;
        this.alpha -= 0.025;
        if (this.y > streamCanvas.height || this.alpha <= 0) this.done = true;
      }
      draw(ctx) {
        const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius * 3);
        grad.addColorStop(0, `rgba(180,230,255,${this.alpha})`);
        grad.addColorStop(0.4, `rgba(91,196,255,${this.alpha * 0.7})`);
        grad.addColorStop(1, `rgba(91,196,255,0)`);
        ctx.globalAlpha = 1;
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius * 3, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    let burstPackets = [];
    let burstTimer = 0;

    function initStream() {
      streamParticles = [];
      burstPackets = [];
      const COUNT = 14;
      for (let i = 0; i < COUNT; i++) {
        streamParticles.push(new StreamParticle());
      }
    }

    function drawStream() {
      ctx.clearRect(0, 0, streamCanvas.width, streamCanvas.height);

      // Draw the tube glow line in center
      const lineGrad = ctx.createLinearGradient(streamCanvas.width / 2, 0, streamCanvas.width / 2, streamCanvas.height);
      lineGrad.addColorStop(0, 'rgba(91,196,255,0.0)');
      lineGrad.addColorStop(0.2, 'rgba(91,196,255,0.25)');
      lineGrad.addColorStop(0.8, 'rgba(91,196,255,0.25)');
      lineGrad.addColorStop(1, 'rgba(91,196,255,0.0)');
      ctx.strokeStyle = lineGrad;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(streamCanvas.width / 2, 0);
      ctx.lineTo(streamCanvas.width / 2, streamCanvas.height);
      ctx.stroke();

      // Burst packets
      burstTimer++;
      if (burstTimer % 40 === 0) burstPackets.push(new BurstPacket());
      burstPackets = burstPackets.filter(p => !p.done);
      burstPackets.forEach(p => { p.update(); p.draw(ctx); });

      // Particles
      streamParticles.forEach(p => { p.update(); p.draw(ctx); });

      if (streamActive) streamRaf = requestAnimationFrame(drawStream);
    }

    function startStream() {
      if (streamActive) return;
      streamActive = true;
      streamCanvas.classList.add('active');
      initStream();
      drawStream();
    }

    function stopStream() {
      streamActive = false;
      streamCanvas.classList.remove('active');
      if (streamRaf) { cancelAnimationFrame(streamRaf); streamRaf = null; }
      ctx.clearRect(0, 0, streamCanvas.width, streamCanvas.height);
    }

    /* ── Keyboard shortcut hint ── */
    document.addEventListener('keydown', e => {
      if (e.key === 'Alt' && e.location === 2) { // right alt
        e.preventDefault();
        if (currentMode === 'idle' || currentMode === 'notepad' || currentMode === 'success') {
          setMode('recording');
        }
      }
    });

    document.addEventListener('keyup', e => {
      if (e.key === 'Alt' && e.location === 2) {
        if (currentMode === 'recording') {
          setMode('live');
          // After all words have streamed in, stop stream and switch to notepad state
          const streamDuration = sampleWords.length * 260 + 800;
          setTimeout(() => {
            if (currentMode === 'live') {
              stopStream();
              // brief pause then switch to notepad-done state
              setTimeout(() => {
                if (currentMode === 'live') setMode('notepad');
              }, 350);
            }
          }, streamDuration);
        }
      }
    });

    // init
    setMode('idle');
  </script>
</body>

</html>
