<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">

  <!-- Red background fills the full icon -->
  <rect width="512" height="512" rx="114" fill="#D94F3D"/>

  <!-- Subtle gloss -->
  <rect width="512" height="256" rx="114" fill="url(#gloss)"/>
  <rect y="200" width="512" height="56" fill="url(#gloss)"/>

  <!-- Mic body -->
  <rect x="221" y="120" width="70" height="130" rx="35" fill="white"/>
  <!-- Mic arc -->
  <path d="M155 248 Q155 340 256 340 Q357 340 357 248" stroke="white" stroke-width="18" fill="none" stroke-linecap="round"/>
  <!-- Stand -->
  <line x1="256" y1="340" x2="256" y2="385" stroke="white" stroke-width="18" stroke-linecap="round"/>
  <!-- Base -->
  <line x1="210" y1="385" x2="302" y2="385" stroke="white" stroke-width="18" stroke-linecap="round"/>

  <defs>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

</svg>
